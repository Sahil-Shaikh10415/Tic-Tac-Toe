<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="msg-container hide">
        <p id="msg">Winner</p>
        <botton class="new-game">New Game</botton>
    </div>
    <main>
        <h1>Tic Tac Toe</h1>
        <div class="container">
            <div class="game">
                <botton class="box"></botton>
                <botton class="box"></botton>
                <botton class="box"></botton>
                <botton class="box"></botton>
                <botton class="box"></botton>
                <botton class="box"></botton>
                <botton class="box"></botton>
                <botton class="box"></botton>
                <botton class="box"></botton>
            </div>
        </div>
        <botton class="reset_botton">Reset Game</botton>
    </main>
    <script src="app.js"></script>
</body>
</html>
